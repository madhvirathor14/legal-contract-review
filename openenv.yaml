name: legal-contract-review
version: "1.0"
description: >
  An OpenEnv-compliant reinforcement learning environment where AI agents learn to review
  legal contracts like a professional attorney.

author: Legal Contract Review Team
tags:
  - legal
  - nlp
  - contract-review
  - real-world

tasks:
  - name: find_missing_clauses
    description: "Identify all standard clauses missing from a contract"
    difficulty: easy
    reward_range: [0.0, 1.0]
    max_steps: 3
    grader:
      type: function
      module: graders
      function: grade_find_missing_clauses
      partial_credit: true

  - name: identify_risky_party
    description: "Identify which party is disadvantaged by a flagged clause"
    difficulty: medium
    reward_range: [0.0, 1.0]
    max_steps: 2
    grader:
      type: function
      module: graders
      function: grade_identify_risky_party
      partial_credit: true

  - name: rewrite_ambiguous
    description: "Rewrite an ambiguous clause to be legally precise and enforceable"
    difficulty: hard
    reward_range: [0.0, 1.0]
    max_steps: 1
    grader:
      type: function
      module: graders
      function: grade_rewrite_ambiguous
      partial_credit: true

endpoints:
  reset: /reset
  step: /step
  state: /state

reward:
  type: float
  range: [0.0, 1.0]
  partial_credit: true

grading:
  enabled: true
  num_tasks: 3

port: 7860
framework: fastapi
python_version: "3.11"
